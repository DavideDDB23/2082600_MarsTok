# =============================================================================
# docker-compose.yml — Mars Operations Platform
# =============================================================================
# Build context is the `source/` directory (where this file lives).
# Run: docker compose up --build
# Pre-requisite: run ./load-image.sh once to load the simulator OCI image.
# =============================================================================

services:

  # ── External IoT Simulator ────────────────────────────────────────────────
  simulator:
    image: mars-iot-simulator:multiarch_v1
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/discovery || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Message Broker ────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # ── Cache / Pub-Sub Bus ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Relational Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mars}
      POSTGRES_DB:       ${POSTGRES_DB:-mars}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mars}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Collector (ingest REST + SSE → RabbitMQ) ─────────────────────────────
  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      simulator:
        condition: service_healthy
    restart: on-failure

  # ── Rules Engine (consume events → evaluate → store alerts → actuate) ─────
  rules-engine:
    build:
      context: .
      dockerfile: rules-engine/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── REST + SSE API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      simulator:
        condition: service_healthy
    restart: on-failure

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: on-failure

volumes:
  rabbitmq_data:
  redis_data:
  pg_data:
